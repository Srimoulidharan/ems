{% extends 'ems/base.html' %}{% block content %}<div class="page-head"><h1>Departments</h1></div><section class="panel"><form method="post" class="inline-form">{% csrf_token %}<input name="name" placeholder="Department name" required><input name="code" placeholder="Code" required><input name="head" placeholder="Department head"><input name="location" placeholder="Location"><button class="btn primary">Save</button></form></section><section class="panel"><table><tr><th>Code</th><th>Name</th><th>Head</th><th>Location</th></tr>{% for d in departments %}<tr><td>{{ d.code }}</td><td>{{ d.name }}</td><td>{{ d.head }}</td><td>{{ d.location }}</td></tr>{% endfor %}</table></section>{% endblock %}
