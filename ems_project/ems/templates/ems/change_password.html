{% extends 'ems/base.html' %}{% block title %}Change Password{% endblock %}{% block content %}
<div class="page-head"><h1>Change Password</h1><p>Use a strong password with at least 8 characters.</p></div>
<form class="card form-grid" method="post">{% csrf_token %}<label>Current Password<input type="password" name="current_password" required></label><label>New Password<input type="password" name="new_password" required></label><label>Confirm New Password<input type="password" name="confirm_password" required></label><button class="btn primary">Change Password</button></form>
{% endblock %}
