{% extends 'ems/base.html' %}{% block content %}<div class="page-head"><h1>{% if item %}Edit Employee{% else %}Onboard Employee{% endif %}</h1></div><section class="panel"><form method="post" class="form-grid">{% csrf_token %}<label>Employee ID<input name="userId" value="{{ item.userId }}" required></label><label>Username<input name="username" value="{{ item.username }}" required></label><label>Password<input name="password" value="{{ item.password }}" required></label><label>Full Name<input name="full_name" value="{{ item.full_name }}"></label><label>Email<input name="email" value="{{ item.email }}"></label><label>Phone<input name="phone" value="{{ item.phone }}"></label><label>Role<select name="role"><option value="employee">Employee</option><option value="manager">Manager</option><option value="hr">HR</option><option value="admin">Admin</option></select></label><label>Department<select name="department"><option value="">Select</option>{% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}</select></label><label>Manager<select name="manager"><option value="">None</option>{% for m in managers %}<option value="{{ m.id }}">{{ m.display_name }}</option>{% endfor %}</select></label><label>Designation<input name="designation" value="{{ item.designation }}"></label><label>Status<select name="employment_status"><option>Active</option><option>On Notice</option><option>Inactive</option></select></label><label>Work Location<input name="work_location" value="{{ item.work_location|default:'Head Office' }}"></label><label>Experience<input type="number" name="experience" value="{{ item.experience|default:0 }}"></label><label>Leave Balance<input type="number" name="leaveBalance" value="{{ item.leaveBalance|default:18 }}"></label><label>Salary CTC<input type="number" step="0.01" name="salary_ctc" value="{{ item.salary_ctc|default:0 }}"></label><label>Bank Name<input name="bank_name" value="{{ item.bank_name }}"></label><label>Account Last 4<input name="account_last4" value="{{ item.account_last4 }}"></label><label>Project<input name="projectWorkingOn" value="{{ item.projectWorkingOn }}"></label><label>Skills<input name="skillset" value="{{ item.skillset|join:', ' }}"></label><label>Emergency Contact<input name="emergency_contact" value="{{ item.emergency_contact }}"></label><button class="btn primary">Save Employee</button></form></section>{% endblock %}
