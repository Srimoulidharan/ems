{% extends 'ems/base.html' %}{% block content %}<h1>{% if item %}Edit User{% else %}Add User{% endif %}</h1><form class="panel formgrid" method="post">{% csrf_token %}<label>User ID<input name="userId" value="{{ item.userId }}"></label><label>Username<input name="username" required value="{{ item.username }}"></label><label>Password<input name="password" required value="{{ item.password }}"></label><label>Role<select name="role"><option value="employee" {% if item.role == 'employee' %}selected{% endif %}>Employee</option><option value="manager" {% if item.role == 'manager' %}selected{% endif %}>Manager</option><option value="admin" {% if item.role == 'admin' %}selected{% endif %}>Admin</option></select></label><label>Designation<input name="designation" value="{{ item.designation }}"></label><label>Department<input name="department" value="{{ item.department }}"></label><label>Email<input name="email" type="email" value="{{ item.email }}"></label><label>Phone<input name="phone" value="{{ item.phone }}"></label><label>Experience<input name="experience" type="number" value="{{ item.experience|default:0 }}"></label><label>Leave Balance<input name="leaveBalance" type="number" value="{{ item.leaveBalance|default:12 }}"></label>{% if item %}<label>Leave Taken<input name="leaveTakenThisYear" type="number" value="{{ item.leaveTakenThisYear }}"></label>{% endif %}<label>Project Working On<input name="projectWorkingOn" value="{{ item.projectWorkingOn }}"></label><label class="wide">Skills, comma separated<input name="skillset" value="{{ item.skillset|join:', ' }}"></label><div class="wide"><button class="btn">Save User</button><a class="btn light" href="{% url 'users' %}">Cancel</a></div></form>{% endblock %}
