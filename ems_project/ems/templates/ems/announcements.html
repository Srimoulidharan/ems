{% extends 'ems/base.html' %}
{% block content %}
<div class="page-head">
    <h1>Announcements</h1>
</div>
<section class="panel">
    <form method="post" class="form-grid">
        {% csrf_token %}
        <label>Title
            <input name="title" required>
        </label>
        <label>Audience
            <select name="audience">
                <option>All</option>
                <option>Managers</option>
                <option>Employees</option>
            </select>
        </label>
        <label class="wide">Message
            <textarea name="message" required></textarea>
        </label>
        <button class="btn primary">Publish</button>
    </form>
</section>
<section class="panel">
    <table>
        <tr>
            <th>Title</th>
            <th>Audience</th>
            <th>Message</th>
            <th>Date</th>
        </tr>
        {% for a in announcements %}
        <tr>
            <td>{{ a.title }}</td>
            <td>{{ a.audience }}</td>
            <td>{{ a.message }}</td>
            <td>{{ a.createdAt|date:'d M Y H:i' }}</td>
        </tr>
        {% endfor %}
    </table>
</section>
{% endblock %}
