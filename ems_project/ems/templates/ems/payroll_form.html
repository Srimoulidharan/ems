{% extends 'ems/base.html' %}{% block content %}<div class="page-head"><h1>Process Payroll</h1></div><section class="panel"><form method="post" class="form-grid">{% csrf_token %}<label>Employee<select name="employee">{% for u in users %}<option value="{{ u.id }}">{{ u.display_name }} - {{ u.userId }}</option>{% endfor %}</select></label><label>Month<input name="month" placeholder="June 2026" required></label><label>Basic<input type="number" step="0.01" name="basic" required></label><label>HRA<input type="number" step="0.01" name="hra" value="0"></label><label>Allowance<input type="number" step="0.01" name="allowance" value="0"></label><label>Deductions<input type="number" step="0.01" name="deductions" value="0"></label><label>Status<select name="status"><option>Draft</option><option>Processed</option><option>Paid</option></select></label><button class="btn primary">Save Payroll</button></form></section>{% endblock %}
