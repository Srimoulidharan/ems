{% extends 'ems/base.html' %}{% block content %}<div class="page-head"><h1>Assign Task</h1></div><section class="panel"><form method="post" class="form-grid">{% csrf_token %}<label>Task Name<input name="taskName" required></label><label>Assignee<select name="assignee">{% for e in employees %}<option value="{{ e.id }}">{{ e.display_name }} - {{ e.designation }}</option>{% endfor %}</select></label><label>Priority<select name="priority"><option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option></select></label><label>Deadline<input type="date" name="deadline"></label><label class="wide">Description<textarea name="taskDescription" required></textarea></label><button class="btn primary">Assign Task</button></form></section>{% endblock %}
