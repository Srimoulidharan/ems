{% extends 'ems/base.html' %}{% block content %}<div class="page-head"><h1>Update Task</h1></div><section class="panel"><h2>{{ task.taskName }}</h2><p>{{ task.taskDescription }}</p><form method="post" class="form-grid">{% csrf_token %}<label>Progress %<input type="number" name="progress" min="0" max="100" value="{{ task.progress }}"></label><label class="wide">Work Update / Submission<textarea name="submittedWork">{{ task.submittedWork }}</textarea></label><button class="btn primary">Submit for Review</button></form>{% if task.manager_feedback %}<div class="note"><b>Manager Feedback:</b> {{ task.manager_feedback }}</div>{% endif %}</section>{% endblock %}
